<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="theme-color" content="#ffffff" />
    <meta
      name="description"
      content="Detectamos errores invisibles de accesibilidad en tu web que pueden afectar a clientes, formularios, reservas y compras. Informe claro y accionable en 48h."
    />
    <meta
      name="robots"
      content="index,follow,max-snippet:-1,max-image-preview:large,max-video-preview:-1"
    />
    <meta name="author" content="Noxo IA Empresas" />
    <link rel="canonical" href="https://noxoiaempresas.com/" />

    <meta property="og:type" content="website" />
    <meta property="og:locale" content="es_ES" />
    <meta property="og:site_name" content="Noxo IA Empresas" />
    <meta
      property="og:title"
      content="Auditoría de Accesibilidad Web para Empresas | Noxo IA Empresas"
    />
    <meta
      property="og:description"
      content="Detectamos errores invisibles de accesibilidad en tu web. Informe claro, priorizado y accionable en 48h."
    />
    <meta property="og:url" content="https://noxoiaempresas.com/" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Auditoría de Accesibilidad Web para Empresas | Noxo IA Empresas"
    />
    <meta
      name="twitter:description"
      content="Detectamos errores invisibles de accesibilidad en tu web. Informe claro en 48h."
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <title>Auditoría de Accesibilidad Web para Empresas | Noxo IA Empresas</title>
    <script>
      (function () {
        var path = window.location.pathname.replace(/\/$/, '') || '/';
        var pages = {
          '/': {
            title: 'Auditoría de Accesibilidad Web para Empresas | Noxo IA Empresas',
            description: 'Detectamos errores invisibles de accesibilidad en tu web que pueden afectar a clientes, formularios, reservas y compras. Informe claro y accionable en 48h.',
          },
          '/demo-auditoria': {
            title: 'Ejemplo de Informe de Auditoría | Noxo IA Empresas',
            description: 'Mira un ejemplo de cómo es nuestro informe de auditoría de accesibilidad web: score general, errores priorizados, capturas y recomendaciones.',
          },
          '/precios': {
            title: 'Precios: Auditoría Express y Mantenimiento | Noxo IA Empresas',
            description: 'Auditoría express de accesibilidad web por 149€ con informe en 48h. Mantenimiento mensual por 49€/mes con reescaneo y alertas.',
          },
          '/contacto': {
            title: 'Solicita tu Auditoría de Accesibilidad Web | Noxo IA Empresas',
            description: 'Solicita una auditoría express de accesibilidad web por 149€. Informe claro, capturas y prioridades en 48h. Sin compromiso.',
          },
        };

        var current = pages[path];
        if (!current) return;

        document.title = current.title;
        var description = document.querySelector('meta[name="description"]');
        var ogTitle = document.querySelector('meta[property="og:title"]');
        var ogDescription = document.querySelector('meta[property="og:description"]');
        var ogUrl = document.querySelector('meta[property="og:url"]');
        var twitterTitle = document.querySelector('meta[name="twitter:title"]');
        var twitterDescription = document.querySelector('meta[name="twitter:description"]');
        var canonical = document.querySelector('link[rel="canonical"]');
        var url = 'https://noxoiaempresas.com' + (path === '/' ? '/' : path);

        if (description) description.setAttribute('content', current.description);
        if (ogTitle) ogTitle.setAttribute('content', current.title);
        if (ogDescription) ogDescription.setAttribute('content', current.description);
        if (ogUrl) ogUrl.setAttribute('content', url);
        if (twitterTitle) twitterTitle.setAttribute('content', current.title);
        if (twitterDescription) twitterDescription.setAttribute('content', current.description);
        if (canonical) canonical.setAttribute('href', url);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
