  <head>

    <meta property="og:type" content="website" />
    <meta property="og:locale" content="es_ES" />
    <meta property="og:site_name" content="Noxo IA" />
    <meta
      property="og:title"
      content="Auditoría IA Gratuita para tu Empresa | Noxo IA"
    />
    <meta
      property="og:description"
      content="Te analizamos gratis. En 48h te decimos dónde puedes automatizar, ahorrar y crecer con IA. Después implementamos el proyecto completo."
    />
    <meta property="og:url" content="https://noxoiaempresas.com/" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Auditoría IA Gratuita para tu Empresa | Noxo IA"
    />
    <meta
      name="twitter:description"
      content="Te analizamos gratis. En 48h te decimos dónde puedes automatizar, ahorrar y crecer con IA."
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <title>Auditoría IA Gratuita para tu Empresa | Noxo IA</title>
    <script>
      (function () {
        var path = window.location.pathname.replace(/\/$/, '') || '/';
        var pages = {
          '/': {
            title: 'Auditoría IA Gratuita para tu Empresa | Noxo IA',
            description:
              'Te analizamos gratis. En 48h te decimos dónde puedes automatizar, ahorrar y crecer con IA. Después implementamos el proyecto completo.',
          },
          '/como-funciona': {
            title: 'Cómo trabajamos: de auditoría a implementación IA | Noxo IA',
            description:
              'Proceso transparente: auditoría gratuita, propuesta con presupuesto cerrado e implementación IA end-to-end.',
          },
          '/modalidades': {
            title: 'Modalidades de proyecto IA | Noxo IA',
            description:
              'Tres fases: auditoría gratuita, proyecto con presupuesto cerrado y evolución opcional.',
          },
          '/recursos': {
            title: 'Recursos sobre IA para empresas | Noxo IA',
            description:
              'Guías prácticas sobre cómo la IA puede ahorrar tiempo y generar más ventas en tu empresa.',
          },
          '/coliving-flex-living': {
            title: 'Auditoría IA para coliving y flex living | Noxo IA',
            description:
              'Auditoría IA gratuita para operadores de coliving. Detecta dónde pierdes reservas y automatiza.',
          },
          '/inmobiliarias-property-managers': {
            title: 'Auditoría IA para inmobiliarias y property managers | Noxo IA',
            description:
              'Auditoría IA gratuita para inmobiliarias. Detecta dónde pierdes oportunidades y automatiza.',
          },
          '/clinicas-salud-privada': {
            title: 'Auditoría IA para clínicas y salud privada | Noxo IA',
            description:
              'Auditoría IA gratuita para clínicas. Detecta dónde pierdes pacientes y automatiza consultas.',
          },
          '/academias-formacion': {
            title: 'Auditoría IA para academias y formación | Noxo IA',
            description:
              'Auditoría IA gratuita para academias. Detecta dónde pierdes interesados y automatiza admisiones.',
          },
          '/recursos/auditoria-ia-gratuita-para-empresas': {
            title: 'Qué es una auditoría IA y por qué tu empresa la necesita | Noxo IA',
            description:
              'Una auditoría IA gratuita te dice exactamente dónde puedes automatizar, ahorrar y crecer antes de invertir.',
          },
          '/recursos/automatizar-captacion-leads-con-ia': {
            title: 'Cómo automatizar la captación de leads con IA | Noxo IA',
            description:
              'Sistemas de IA que captan, responden y siguen leads mientras tu equipo se centra en cerrar.',
          },
          '/recursos/ia-para-inmobiliarias-property-managers': {
            title: 'IA para inmobiliarias y property managers | Noxo IA',
            description:
              'Cómo la IA transforma la operación comercial en gestión inmobiliaria.',
          },
        };

        var current = pages[path];
        if (!current) return;

        document.title = current.title;

        var description = document.querySelector('meta[name="description"]');
        var ogTitle = document.querySelector('meta[property="og:title"]');
        var ogDescription = document.querySelector('meta[property="og:description"]');
        var ogUrl = document.querySelector('meta[property="og:url"]');
        var twitterTitle = document.querySelector('meta[name="twitter:title"]');
        var twitterDescription = document.querySelector('meta[name="twitter:description"]');
        var canonical = document.querySelector('link[rel="canonical"]');
        var url = 'https://noxoiaempresas.com' + (path === '/' ? '/' : path);

        if (description) description.setAttribute('content', current.description);
        if (ogTitle) ogTitle.setAttribute('content', current.title);
        if (ogDescription) ogDescription.setAttribute('content', current.description);
        if (ogUrl) ogUrl.setAttribute('content', url);
        if (twitterTitle) twitterTitle.setAttribute('content', current.title);
        if (twitterDescription) twitterDescription.setAttribute('content', current.description);
        if (canonical) canonical.setAttribute('href', url);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
